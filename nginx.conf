server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Single-page app: there is no client-side router yet, but this keeps
  # deep links working if one is added later.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache the hashed assets aggressively; never cache the HTML shell.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
